<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: black;
            color: white;
        }

        h1 {
            text-align: center;
            margin-top: 2rem;
        }

        /* NAV */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 1rem 2rem;
            background: black;
            border-bottom: 2px solid hotpink;
            position: relative;
        }

        /* LINKS */
        .nav-links {
            display: flex;
        }

        #navList {
            display: flex;
            list-style: none;
            gap: 2rem;
            margin: 0;
            padding: 0;
        }

        #navList a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        #navList a:hover {
            color: hotpink;
        }

        /* ICONS */
        #icons {
            display: flex;
            gap: 1rem;
        }

        #icons img {
            width: 28px;
            height: 28px;
        }

        /* HAMBURGER */
        .hamburger-menu {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .bar {
            width: 28px;
            height: 3px;
            background: white;
            transition: 0.3s;
        }

        /* X animation */
        .hamburger-menu.active .bar:nth-child(1) {
            transform: rotate(45deg) translateY(10px);
        }

        .hamburger-menu.active .bar:nth-child(2) {
            opacity: 0;
        }

        .hamburger-menu.active .bar:nth-child(3) {
            transform: rotate(-45deg) translateY(-10px);
        }

        /* MOBILE */
        @media (max-width: 768px) {

            .hamburger-menu {
                display: flex;
            }

            #icons {
                display: none;
            }

            .nav-links {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: black;

                max-height: 0;
                overflow: hidden;
                transition: max-height 0.4s ease;
            }

            .nav-links.active {
                max-height: 300px;
            }

            #navList {
                flex-direction: column;
                align-items: center;
                padding: 1.5rem 0;
                gap: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <h1>Nav Test</h1>

    <!-- INSERT POINT -->
    <div id="navContainer"></div>

    <script src="script.js"></script>

</body>
</html>
